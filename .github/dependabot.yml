version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'
    labels:
      - 'dependencies'
      - 'npm'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'development'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
  - package-ecosystem: 'npm'
    directory: '/website'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'
    labels:
      - 'dependencies'
      - 'website'
      - 'npm'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'development'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'github-actions'
